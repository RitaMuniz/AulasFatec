<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Cartões</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">Minha Livraria</div>
    <div>
        <a href="index.html">Home</a>
        <a href="perfilCliente.html">Perfil</a>
        <a href="login.html">Sair</a>
    </div>
</div>

<div class="container">

    <h1 style="margin-bottom:40px;">Gerenciar Cartões</h1>


    <div class="form-box">
        <h2 style="margin-bottom:20px;">Novo Cartão</h2>

        <form action="CartaoServlet" method="post">
            <input type="text" name="nomeTitular" placeholder="Nome do Titular" required>
            <input type="text" name="numeroCartao" placeholder="Número do Cartão" required>
            <input type="text" name="validade" placeholder="Validade (MM/AA)" required>
            <input type="text" name="cvv" placeholder="CVV" required>

            <button type="submit" class="btn" style="width:100%;">Adicionar Cartão</button>
        </form>
    </div>


    <h2 style="margin-bottom:20px;">Cartões Cadastrados</h2>

    <table class="table">
        <thead>
        <tr>
            <th>Titular</th>
            <th>Final</th>
            <th>Validade</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Maria Silva</td>
            <td>**** 1234</td>
            <td>12/28</td>
            <td>
                <a href="#" class="btn">Editar</a>
                <a href="#" class="btn" style="background:#b00020;">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<footer>
    © 2026 Livraria
</footer>

</body>
</html>
