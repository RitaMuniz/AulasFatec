<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">Livraria</div>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<div class="form-box" style="max-width:400px; margin:80px auto;">

    <h2 style="text-align:center; margin-bottom:24px;">Entrar</h2>

    <form action="/login" method="post">

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Sua senha" required>

        <button type="submit" class="btn" style="width:100%; margin-top:16px;">Entrar</button>

    </form>

    <p style="margin-top:20px; text-align:center;">
        Não tem conta? <a href="cadastro.html">Criar conta</a>
    </p>

</div>

<footer>Livraria © 2026</footer>

</body>
</html>
