<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">Livraria</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="livros.html">Livros</a>
        <a href="login.jsp">Login</a>
        <a href="carrinho.html">Carrinho</a>
    </nav>
</header>

<div class="container">

    <h2 style="margin-bottom:40px;">Finalizar Compra</h2>

    <div class="grid" style="grid-template-columns: 2fr 1fr; align-items:start;">


        <div class="card" style="text-align:left;">

            <h3>Endereço de Entrega</h3>

            <input type="text" placeholder="CEP" style="width:100%; padding:12px; margin:10px 0;">
            <input type="text" placeholder="Rua" style="width:100%; padding:12px; margin:10px 0;">
            <input type="text" placeholder="Número" style="width:100%; padding:12px; margin:10px 0;">
            <input type="text" placeholder="Bairro" style="width:100%; padding:12px; margin:10px 0;">
            <input type="text" placeholder="Cidade" style="width:100%; padding:12px; margin:10px 0;">

            <br><br>

            <h3>Forma de Pagamento</h3>

            <select style="width:100%; padding:12px; margin:10px 0;">
                <option>Cartão de Crédito</option>
                <option>Pix</option>
                <option>Boleto</option>
            </select>

            <select style="width:100%; padding:12px; margin:10px 0;">
                <option>1x sem juros</option>
                <option>2x sem juros</option>
                <option>3x sem juros</option>
            </select>

            <input type="text" placeholder="Cupom Promocional" style="width:100%; padding:12px; margin:10px 0;">
            <input type="text" placeholder="Cupom de Troca" style="width:100%; padding:12px; margin:10px 0;">

        </div>


        <div class="card">

            <h3>Resumo do Pedido</h3>

            <p>Engenharia de Software (1x)</p>
            <p>Subtotal: R$ 120,00</p>
            <p>Frete: R$ 15,00</p>
            <p>Desconto: R$ 0,00</p>

            <hr style="margin:15px 0;">

            <h3>Total</h3>
            <p class="preco" style="font-size:22px;">R$ 135,00</p>

            <br>

            <a href="carrinho.html" class="btn" style="margin-right:10px;">
                Voltar
            </a>

            <a href="confirmacao.html" class="btn">
                Confirmar Pedido
            </a>

        </div>

    </div>

</div>

<footer>
    © 2026 - Projeto LES
</footer>

</body>
</html>
